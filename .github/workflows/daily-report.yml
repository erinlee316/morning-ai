name: Daily research update

on:
  schedule:
    # 13:00 UTC = 6 AM Pacific Daylight Time (UTC-7)
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY1: ${{ secrets.GROQ_API_KEY1 }}
      GROQ_API_KEY2: ${{ secrets.GROQ_API_KEY2 }}
      GROQ_API_KEY3: ${{ secrets.GROQ_API_KEY3 }}
      GROQ_API_KEY4: ${{ secrets.GROQ_API_KEY4 }}
      GROQ_API_KEY5: ${{ secrets.GROQ_API_KEY5 }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run research pipeline
        run: python agent.py

      - name: Export static site
        run: python scripts/export_site.py

      - name: Commit generated updates
        run: |
          git config user.name "erinlee316"
          git config user.email "erinlee316@gmail.com"
          git add docs/report.json
          if git diff --cached --quiet; then
            echo "No content changes to commit."
          else
            git commit -m "update daily research report"
            git push
          fi
